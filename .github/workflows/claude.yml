name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write

jobs:
  claude:
    name: Claude Code Execution
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))

    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Prepare MCP Config - STDIO Mode
        run: |
          # Configuration MCP en mode stdio (command-based) au lieu de HTTP
          cat > /tmp/mcp-config.json << 'CONFIGEOF'
          {
            "mcpServers": {
              "supabase": {
                "command": "npx",
                "args": [
                  "-y",
                  "@supabase/mcp-server-supabase@latest",
                  "--project-ref=clcpszhztwfhnvirexao"
                ],
                "env": {
                  "SUPABASE_ACCESS_TOKEN": "REPLACE_ACCESS_TOKEN"
                }
              },
              "smithery-ai-server-sequential-thinking": {
                "type": "http",
                "url": "https://server.smithery.ai/@xinzhongyouhai/mcp-sequentialthinking-tools/mcp",
                "headers": {
                  "X-API-Key": "REPLACE_SMITHERY_KEY"
                }
              },
              "byterover-mcp": {
                "command": "npx",
                "args": ["-y", "@byterover/mcp-server@latest"]
              }
            }
          }
          CONFIGEOF

          # Substitution des secrets
          sed -i "s|REPLACE_ACCESS_TOKEN|${{ secrets.SUPABASE_ACCESS_TOKEN }}|g" /tmp/mcp-config.json
          sed -i "s|REPLACE_SMITHERY_KEY|${{ secrets.SMITHERY_API_KEY }}|g" /tmp/mcp-config.json

          echo "✅ MCP config créé en mode STDIO"
          echo "Serveurs configurés:"
          cat /tmp/mcp-config.json | jq -r '.mcpServers | keys[]' | while read server; do
            echo "  - $server"
          done

      - name: 🤖 Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --mcp-config /tmp/mcp-config.json
            --max-turns 20
            --allowedTools "mcp__supabase__*,mcp__byterover-mcp__*,mcp__smithery-ai-server-sequential-thinking__*"
            --mcp-debug
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
