name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write

jobs:
  claude:
    name: Claude Code Execution
    # Déclenche uniquement si @claude est mentionné
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🤖 Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Authentification
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
          # Configuration MCP (charge le fichier)
          mcp_config: .github/mcp-config.json
          
          # Outils autorisés
          allowed_tools: |
            Bash(git:*),
            Read,
            Write,
            Edit,
            Glob,
            Grep,
            mcp__supabase__*,
            mcp__byterover-mcp__*,
            mcp__smithery-ai-server-sequential-thinking__*,
            mcp__linear__*,
            mcp__chrome-devtools__*,
            mcp__vercel__*
          
          # Limite de tours de conversation
          max_turns: 20
          
          # Modèle à utiliser
          model: claude-sonnet-4-5-20250929
          
          # Timeout
          timeout_minutes: 25
        env:
          # Variables d'environnement pour MCP Supabase
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          
          # Variables pour Smithery (Sequential Thinking + Linear)
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
          
          # GitHub Token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 📊 Upload Execution Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-log
          path: claude-execution.json
          retention-days: 7
