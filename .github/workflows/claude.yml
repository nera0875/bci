name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write

jobs:
  claude:
    name: Claude Code Execution
    # Déclenche uniquement si @claude est mentionné
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🔧 Prepare MCP Config with Secrets
        run: |
          # Créer URL avec query params pour Smithery
          SUPABASE_MCP_URL="https://server.smithery.ai/@supabase-community/supabase-mcp/mcp?api_key=${{ secrets.SMITHERY_API_KEY }}&profile=rolling-ladybug-4DEfPv&accessToken=${{ secrets.SUPABASE_ACCESS_TOKEN }}&projectRef=clcpszhztwfhnvirexao"
          SEQUENTIAL_MCP_URL="https://server.smithery.ai/@xinzhongyouhai/mcp-sequentialthinking-tools/mcp?api_key=${{ secrets.SMITHERY_API_KEY }}&profile=rolling-ladybug-4DEfPv"
          
          # Créer fichier MCP config
          cat > /tmp/mcp-config.json << EOF
          {
            "mcpServers": {
              "supabase": {
                "type": "http",
                "url": "$SUPABASE_MCP_URL"
              },
              "smithery-ai-server-sequential-thinking": {
                "type": "http",
                "url": "$SEQUENTIAL_MCP_URL"
              },
              "byterover-mcp": {
                "command": "npx",
                "args": [
                  "-y",
                  "@byterover/mcp-server@latest"
                ]
              }
            }
          }
          EOF
          
          echo "✅ MCP config créé avec URL parameters"
          cat /tmp/mcp-config.json | jq -r '.mcpServers | keys[]' | while read server; do
            echo "  - $server"
          done
      
      - name: 🤖 Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
          claude_args: |
            --mcp-config /tmp/mcp-config.json
            --max-turns 20
        env:
          # Variables pour MCP servers qui les lisent directement
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 📊 Upload Execution Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-log
          path: claude-execution.json
          retention-days: 7
          if-no-files-found: warn
